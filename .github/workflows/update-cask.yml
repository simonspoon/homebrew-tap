name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update cask
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/update-cask.sh \
            "${{ github.event.client_payload.tool }}" \
            "${{ github.event.client_payload.version }}" \
            "${{ github.event.client_payload.repo }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ${{ github.event.client_payload.tool }} cask to ${{ github.event.client_payload.version }}"
            git push
          fi
